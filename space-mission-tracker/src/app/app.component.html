<main class="app-shell">
  <section class="hero">
    <div>
      <span class="eyebrow">Progetto a piacere</span>
      <h1>{{ title }}</h1>
      <p>Lista missioni spaziali con selezione dettagliata: agenzia, equipaggio e stato di successo.</p>
    </div>
  </section>

  <section class="mission-list">
    <h2>Missioni disponibili</h2>
    <div class="cards">
      <article
        *ngFor="let mission of missions"
        class="card"
        [class.success]="mission.successo"
        [class.failure]="!mission.successo"
        [class.selected]="selectedMission === mission"
        (click)="selectMission(mission)"
      >
        <div>
          <h3>{{ mission.nomeMissione }}</h3>
          <p class="destination">{{ mission.destinazione }}</p>
        </div>
        <div class="meta">
          <span>{{ mission.anno }}</span>
          <span>{{ mission.successo ? '✅ Successo' : '❌ Fallita' }}</span>
        </div>
      </article>
    </div>
  </section>

  <app-mission-detail *ngIf="selectedMission" [mission]="selectedMission"></app-mission-detail>
</main>
